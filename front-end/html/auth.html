<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion & Inscription - La Chenille et l'Oiseau Gardien</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-container {
      width: 100%;
      max-width: 450px;
    }

    .auth-card {
      background: rgba(26, 26, 26, 0.9);
      border: 2px solid var(--snake-green);
      border-radius: 15px;
      padding: 3rem 2rem;
      box-shadow: 0 15px 40px var(--snake-shadow);
      backdrop-filter: blur(10px);
    }

    .auth-title {
      font-size: 1.8rem;
      color: var(--snake-green);
      text-align: center;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .auth-subtitle {
      text-align: center;
      color: #95a5a6;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: #ecf0f1;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    select {
      width: 100%;
      padding: 0.9rem 1rem;
      background: rgba(46, 204, 113, 0.05);
      border: 1.5px solid var(--snake-green);
      border-radius: 8px;
      color: #ecf0f1;
      font-size: 1rem;
      transition: var(--transition);
      font-family: inherit;
    }

    input:focus,
    select:focus {
      outline: none;
      background: rgba(46, 204, 113, 0.1);
      border-color: var(--snake-highlight);
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
    }

    input::placeholder {
      color: #7f8c8d;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-row .form-group {
      margin-bottom: 0;
    }

    .difficulty-group {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .difficulty-btn {
      padding: 0.6rem 0.5rem;
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid var(--snake-green);
      border-radius: 6px;
      color: #95a5a6;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.85rem;
    }

    .difficulty-btn:hover,
    .difficulty-btn.active {
      background: var(--snake-green);
      color: #1a1a1a;
      border-color: var(--snake-highlight);
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--snake-green) 0%, var(--snake-accent) 100%);
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
    }

    .toggle-form {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(46, 204, 113, 0.2);
      color: #95a5a6;
      font-size: 0.95rem;
    }

    .toggle-form a {
      color: var(--snake-green);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }

    .toggle-form a:hover {
      color: var(--snake-highlight);
      text-decoration: underline;
    }

    .form-container {
      display: none;
    }

    .form-container.active {
      display: block;
      animation: slideInUp 0.3s ease;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1rem;
      color: #95a5a6;
      font-size: 0.9rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .back-to-home {
      display: inline-block;
      color: var(--snake-green);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }

    .back-to-home:hover {
      color: var(--snake-highlight);
    }

    .error-message {
      background: rgba(231, 76, 60, 0.1);
      border-left: 3px solid var(--snake-danger);
      color: #e74c3c;
      padding: 1rem;
      border-radius: 5px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <div class="logo">
        🐛 LABYRINTHES
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="top.html">Top Joueurs</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="auth-container">
      <a href="index.html" class="back-to-home">← Retour à l'accueil</a>

      <div class="auth-card">
        <!-- Connexion Form -->
        <div id="loginForm" class="form-container active">
          <h1 class="auth-title">🎮 Connexion</h1>
          <p class="auth-subtitle">Bienvenue de retour, joueur!</p>

          <div class="error-message" id="loginError"></div>

          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
              <label for="loginPassword">Mot de passe</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="rememberMe">
              <label for="rememberMe" style="margin: 0; text-transform: none;">Se souvenir de moi</label>
            </div>

            <button type="submit" class="btn-submit">Se Connecter</button>
          </form>

          <div class="toggle-form">
            Pas encore de compte? <a onclick="toggleForms()">Créer un compte</a>
          </div>
        </div>

        <!-- Inscription Form -->
        <div id="registerForm" class="form-container">
          <h1 class="auth-title">🐛 Inscription</h1>
          <p class="auth-subtitle">Joins la communauté!</p>

          <div class="error-message" id="registerError"></div>

          <form onsubmit="handleRegister(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="registerFirstName">Prénom</label>
                <input type="text" id="registerFirstName" placeholder="Lucas" required>
              </div>

              <div class="form-group">
                <label for="registerLastName">Nom</label>
                <input type="text" id="registerLastName" placeholder="Dupont" required>
              </div>
            </div>

            <div class="form-group">
              <label for="registerEmail">Email</label>
              <input type="email" id="registerEmail" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
              <label for="registerPassword">Mot de passe</label>
              <input type="password" id="registerPassword" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
              <label for="registerConfirmPassword">Confirmer le mot de passe</label>
              <input type="password" id="registerConfirmPassword" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
              <label for="registerBirthYear">Année de naissance</label>
              <input type="number" id="registerBirthYear" placeholder="1990" min="1950" max="2020" required>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="agreeTerms" required>
              <label for="agreeTerms" style="margin: 0; text-transform: none;">
                J'accepte les <a href="#" style="color: var(--snake-green);">conditions d'utilisation</a>
              </label>
            </div>

            <button type="submit" class="btn-submit">Créer un Compte</button>
          </form>

          <div class="toggle-form">
            Déjà un compte? <a onclick="toggleForms()">Se connecter</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>🐛 La Chenille et l'Oiseau Gardien © 2026 | <a href="index.html" style="color: var(--snake-green); text-decoration: none;">Retour à la landing</a></p>
  </footer>

  <script src="../js/auth.js"></script>
</body>
</html>
