<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion & Inscription - La Chenille et l'Oiseau Gardien</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <div class="logo">
        🐛 LABYRINTHES
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="top.html">Top Joueurs</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="auth-container">
      <a href="index.html" class="back-to-home">← Retour à l'accueil</a>

      <div class="auth-card">
        <!-- Connexion Form -->
        <div id="loginForm" class="form-container active">
          <h1 class="auth-title">🎮 Connexion</h1>
          <p class="auth-subtitle">Bienvenue de retour, joueur!</p>

          <div class="error-message" id="loginError"></div>

          <form onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
              <label for="loginPassword">Mot de passe</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="rememberMe">
              <label for="rememberMe" style="margin: 0; text-transform: none;">Se souvenir de moi</label>
            </div>

            <button type="submit" class="btn-submit">Se Connecter</button>
          </form>

          <div class="toggle-form">
            Pas encore de compte? <a onclick="toggleForms()">Créer un compte</a>
          </div>
        </div>

        <!-- Inscription Form -->
        <div id="registerForm" class="form-container">
          <h1 class="auth-title">🐛 Inscription</h1>
          <p class="auth-subtitle">Joins la communauté!</p>

          <div class="error-message" id="registerError"></div>

          <form onsubmit="handleRegister(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="registerFirstName">Prénom</label>
                <input type="text" id="registerFirstName" placeholder="Lucas" required>
              </div>

              <div class="form-group">
                <label for="registerLastName">Nom</label>
                <input type="text" id="registerLastName" placeholder="Dupont" required>
              </div>
            </div>

            <div class="form-group">
              <label for="registerEmail">Email</label>
              <input type="email" id="registerEmail" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
              <label for="registerPassword">Mot de passe</label>
              <input type="password" id="registerPassword" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
              <label for="registerConfirmPassword">Confirmer le mot de passe</label>
              <input type="password" id="registerConfirmPassword" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
              <label for="registerBirthYear">Année de naissance</label>
              <input type="number" id="registerBirthYear" placeholder="1990" min="1950" max="2020" required>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="agreeTerms" required>
              <label for="agreeTerms" style="margin: 0; text-transform: none;">
                J'accepte les <a href="#" style="color: var(--snake-green);">conditions d'utilisation</a>
              </label>
            </div>

            <button type="submit" class="btn-submit">Créer un Compte</button>
          </form>

          <div class="toggle-form">
            Déjà un compte? <a onclick="toggleForms()">Se connecter</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>🐛 La Chenille et l'Oiseau Gardien © 2026 | <a href="index.html" style="color: var(--snake-green); text-decoration: none;">Retour à la landing</a></p>
  </footer>

  <script src="../js/auth.js"></script>
</body>
</html>
