<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Joueurs - La Chenille et l'Oiseau Gardien</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-container">
      <div class="logo">
        🐛 LABYRINTHES
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="auth.html" class="btn-nav">Jouer</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="top-header">
      <h1>🏆 Classement des Joueurs</h1>
      <p>Les meilleurs explorateurs de labyrinthes</p>
    </div>

    <!-- Personal Best -->
    <div class="personal-best" id="personalBest" style="display: none;">
      <h2><span class="medal">🎖️</span>Ton Meilleur Score</h2>
      <div class="personal-best-score" id="personalScore">0</div>
      <div class="personal-best-info">
        <span id="personalLevels">0 niveaux complétés</span> • 
        <span id="personalDate">Aujourd'hui</span>
      </div>
    </div>

    <!-- Filtres -->
    <div class="filters">
      <button class="filter-btn active" onclick="filterBy('all')">Tous les Temps</button>
      <button class="filter-btn" onclick="filterBy('week')">Cette Semaine</button>
      <button class="filter-btn" onclick="filterBy('month')">Ce Mois</button>
    </div>

    <!-- Leaderboard -->
    <div class="leaderboard-container">
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th style="width: 10%;">Rang</th>
            <th style="width: 30%;">Joueur</th>
            <th style="width: 20%;">Score</th>
            <th style="width: 20%;">Niveaux</th>
            <th style="width: 20%;">Mise à Jour</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <!-- Les données seront insérées par JavaScript -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>🐛 La Chenille et l'Oiseau Gardien © 2026 | <a href="index.html" style="color: var(--snake-green); text-decoration: none;">Retour à la landing</a></p>
  </footer>

  <script src="../js/top.js"></script>
</body>
</html>
